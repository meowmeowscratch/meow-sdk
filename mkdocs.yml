site_name: meow-sdk
site_url: https://meow-sdk.readthedocs.io
site_description: Python SDK and CLI for the meow meow scratch API
repo_url: https://github.com/meowmeowscratch/meow-sdk
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Raspberry Pi: raspberry-pi.md
  - CLI Reference: cli.md
  - API Reference: api-reference.md
  - Dashboards: dashboards.md
  - Error Handling: errors.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
